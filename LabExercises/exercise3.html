<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-
width, initial-scale=1.0">

    <title>Module 1 Exercise 3</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
        }

        .container {
            display: flex;
            min-height:

                100vh;
            align-items: stretch;
        }

        .column {
            background: goldenrod;
            display:
                flex;
            flex-direction: column;
            justify-content:
                center;
            align-items: center;
            flex: 1;
        }

        button {
            height: 20px;
            width: 100px;
            background-color: purple;
            padding: 10;
        }

        .button1 {
            height: 20px;
            width: 100px;
            background-color: blue;
            padding: 10;
        }


    </style>
</head>

<body>
    <div class="container">
        <div class="column" id="column1">
            <h1 id="heading1">Hello</h1>
            <button onclick="changeColumn1()" class="button">Change Me!</button>
            <img src="https://i.etsystatic.com/13434992/r/il/b012c5/3306704673/il_fullxfull.3306704673_hepv.jpg" alt="A smiling sun" width="500" height="600">
        </div>

        <div class="column" id="column2">
            <h1 id="heading2">World</h1>
            <button onclick="changeColumn2()" class="button1">Change Me!</button>
            <img src="https://easydrawingguides.com/wp-content/uploads/2019/04/how-to-draw-a-crescent-moon-featured-image-1200.png" alt="A smiling moon" width="500" height="600">
        </div>
    </div>
</body>

<script>

function changeColumn1() {
document.getElementById("column1").style.backgroundColor = 'blue';
}

function changeColumn2() {
document.getElementById("column2").style.backgroundColor = 'purple';
}
</script>

</html>
